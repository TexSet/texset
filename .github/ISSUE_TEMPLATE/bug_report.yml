name: Bug report
description: Something isn't working the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a report. The more detail, the faster we can fix it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Describe the bug and what you expected instead.
      placeholder: When I click compile, the preview stays blank...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create a new project from the article template
        2. Add an \includegraphics line
        3. Compile
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, Ubuntu 24.04, Windows 11...
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How are you running TexSet
      options:
        - Docker (docker compose up)
        - Local dev (pnpm dev)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Compile log or console output
      description: Paste anything relevant. It will be rendered as code automatically.
      render: shell
