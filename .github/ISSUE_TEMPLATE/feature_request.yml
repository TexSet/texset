name: Feature Request
description: Suggest a new feature or improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? Why should it exist?
      placeholder: Describe the problem or use case that motivates this request.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches or workarounds?
    validations:
      required: false

  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement this
          required: false
