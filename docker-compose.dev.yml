# Development setup with hot reload. The source tree is mounted into the
# container, while node_modules and .next stay inside it so host and container
# don't fight over platform-specific files.

services:
  texset-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: texset-dev
    ports:
      - "7474:7474"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - TEXSET_DATA_DIR=/app/projects
      - PORT=7474
      - WATCHPACK_POLLING=true
